<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes — Gestão para Oficina Mecânica</title>
<style>
  :root{
    --petroleo:#0F3D57;
    --petroleo-2:#0b2f44;
    --laranja:#F26522;
    --laranja-2:#d9541a;
    --grafite:#1E2A33;
    --cinza:#F4F6F8;
    --verde:#2FB37A;
    --vermelho:#E24C4B;
    --amarelo:#E8A100;
    --borda:#e2e8ee;
    --txt:#1E2A33;
    --txt-2:#5b6b78;
    --branco:#ffffff;
    --sombra:0 1px 3px rgba(15,61,87,.08),0 4px 12px rgba(15,61,87,.06);
    --raio:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter','Segoe UI',Roboto,system-ui,-apple-system,sans-serif;
    background:var(--cinza);
    color:var(--txt);
    font-size:14px;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:14px}

  /* ===== LOGIN ===== */
  #login{
    position:fixed;inset:0;z-index:100;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--petroleo) 0%,var(--petroleo-2) 100%);
  }
  .login-card{
    background:var(--branco);border-radius:20px;padding:40px;
    width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;
  }
  .brand{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px}
  .logo-mark{
    width:46px;height:46px;border-radius:12px;
    background:var(--laranja);display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:22px;box-shadow:0 6px 16px rgba(242,101,34,.4);
  }
  .logo-mark svg{width:28px;height:28px}
  .brand h1{font-size:26px;color:var(--petroleo);letter-spacing:.5px}
  .login-sub{color:var(--txt-2);margin-bottom:26px;font-size:13px}
  .login-card label{display:block;text-align:left;font-size:12px;font-weight:600;color:var(--txt-2);margin:14px 0 6px}
  .login-card input, .login-card select{
    width:100%;padding:12px 14px;border:1.5px solid var(--borda);border-radius:10px;outline:none;
  }
  .login-card input:focus, .login-card select:focus{border-color:var(--laranja)}
  .btn-login{
    width:100%;margin-top:22px;background:var(--laranja);color:#fff;
    padding:14px;border-radius:10px;font-weight:700;font-size:15px;
    box-shadow:0 6px 16px rgba(242,101,34,.35);transition:.15s;
  }
  .btn-login:hover{background:var(--laranja-2)}
  .login-hint{margin-top:16px;font-size:11px;color:var(--txt-2)}

  /* ===== LAYOUT ===== */
  #app{display:none;height:100vh;grid-template-columns:238px 1fr;grid-template-rows:64px 1fr}
  #app.show{display:grid}

  .sidebar{
    grid-row:1 / span 2;background:var(--petroleo);color:#cfe0ea;
    display:flex;flex-direction:column;overflow-y:auto;
  }
  .sidebar::-webkit-scrollbar{width:6px}
  .sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
  .side-brand{
    display:flex;align-items:center;gap:11px;padding:16px 18px;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .side-brand .logo-mark{width:38px;height:38px;font-size:18px;border-radius:10px}
  .side-brand .logo-mark svg{width:22px;height:22px}
  .side-brand .name{font-size:20px;font-weight:800;color:#fff;letter-spacing:.5px}
  .side-brand .tag{font-size:10px;color:#8fb0c4;display:block;margin-top:-2px}
  .nav-group{padding:14px 14px 4px}
  .nav-group-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#6f95ab;padding:0 8px 6px;font-weight:700}
  .nav-item{
    display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:9px;
    color:#cfe0ea;font-weight:500;font-size:14px;width:100%;text-align:left;transition:.12s;position:relative;
  }
  .nav-item .ic{width:20px;text-align:center;font-size:16px}
  .nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
  .nav-item.active{background:var(--laranja);color:#fff;box-shadow:0 4px 12px rgba(242,101,34,.35)}
  .nav-item .badge{margin-left:auto;background:var(--vermelho);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px}
  .nav-item.active .badge{background:rgba(255,255,255,.25)}

  .topbar{
    grid-column:2;background:var(--branco);border-bottom:1px solid var(--borda);
    display:flex;align-items:center;gap:16px;padding:0 24px;box-shadow:var(--sombra);z-index:5;
  }
  .search{
    flex:1;max-width:520px;display:flex;align-items:center;gap:10px;
    background:var(--cinza);border:1.5px solid transparent;border-radius:10px;padding:10px 14px;
  }
  .search:focus-within{border-color:var(--laranja);background:#fff}
  .search input{border:none;background:none;outline:none;flex:1;font-size:14px}
  .search .ic{color:var(--txt-2);font-size:16px}
  .topbar-actions{margin-left:auto;display:flex;align-items:center;gap:14px}
  .icon-btn{
    width:40px;height:40px;border-radius:10px;background:var(--cinza);
    display:flex;align-items:center;justify-content:center;font-size:16px;position:relative;transition:.12s;
  }
  .icon-btn:hover{background:#e8ecf1}
  .icon-btn .dot{position:absolute;top:9px;right:10px;width:8px;height:8px;background:var(--vermelho);border-radius:50%;border:2px solid #fff}
  .user-chip{display:flex;align-items:center;gap:10px;padding-left:14px;border-left:1px solid var(--borda)}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--petroleo);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
  .user-chip .u-name{font-weight:700;font-size:13px;line-height:1.1}
  .user-chip .u-role{font-size:11px;color:var(--txt-2)}

  .main{grid-column:2;overflow-y:auto;padding:26px 28px}

  /* ===== COMPONENTES ===== */
  .page-head{display:flex;align-items:center;margin-bottom:22px;gap:16px;flex-wrap:wrap}
  .page-head h2{font-size:24px;color:var(--petroleo);font-weight:800}
  .page-head p{color:var(--txt-2);font-size:13px;margin-top:2px}
  .page-head .spacer{flex:1}

  .btn{
    display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:10px;
    font-weight:700;font-size:14px;transition:.14s;white-space:nowrap;
  }
  .btn-primary{background:var(--laranja);color:#fff;box-shadow:0 4px 12px rgba(242,101,34,.3)}
  .btn-primary:hover{background:var(--laranja-2)}
  .btn-ghost{background:#fff;color:var(--petroleo);border:1.5px solid var(--borda)}
  .btn-ghost:hover{border-color:var(--petroleo);background:var(--cinza)}
  .btn-sm{padding:7px 12px;font-size:12.5px;border-radius:8px}
  .btn-success{background:var(--verde);color:#fff}
  .btn-success:hover{filter:brightness(.94)}

  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .stat{
    background:#fff;border-radius:var(--raio);padding:18px;box-shadow:var(--sombra);
    border:1px solid var(--borda);position:relative;overflow:hidden;
  }
  .stat .s-ic{
    position:absolute;top:16px;right:16px;width:44px;height:44px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;font-size:20px;
  }
  .stat .s-label{font-size:12.5px;color:var(--txt-2);font-weight:600}
  .stat .s-val{font-size:28px;font-weight:800;color:var(--grafite);margin-top:8px;line-height:1}
  .stat .s-sub{font-size:11.5px;margin-top:8px;font-weight:600}
  .up{color:var(--verde)} .down{color:var(--vermelho)}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

  .panel{background:#fff;border-radius:var(--raio);box-shadow:var(--sombra);border:1px solid var(--borda);overflow:hidden}
  .panel-head{display:flex;align-items:center;padding:16px 18px;border-bottom:1px solid var(--borda)}
  .panel-head h3{font-size:15px;color:var(--petroleo);font-weight:800}
  .panel-head .spacer{flex:1}
  .panel-head a{color:var(--laranja);font-size:12.5px;font-weight:700;cursor:pointer}
  .panel-body{padding:8px 18px 16px}

  .list-row{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--cinza)}
  .list-row:last-child{border-bottom:none}
  .list-row .l-ic{width:38px;height:38px;border-radius:10px;background:var(--cinza);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .list-row .l-main{flex:1;min-width:0}
  .list-row .l-title{font-weight:700;font-size:13.5px}
  .list-row .l-sub{font-size:12px;color:var(--txt-2);margin-top:1px}
  .list-row .l-right{text-align:right;font-size:12.5px;font-weight:700}

  table{width:100%;border-collapse:collapse}
  thead th{
    text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;
    color:var(--txt-2);font-weight:700;padding:12px 14px;border-bottom:1.5px solid var(--borda);
  }
  tbody td{padding:13px 14px;border-bottom:1px solid var(--cinza);font-size:13.5px}
  tbody tr{transition:.1s}
  tbody tr:hover{background:#fafcfd}
  tbody tr:last-child td{border-bottom:none}
  .t-strong{font-weight:700}
  .t-mut{color:var(--txt-2);font-size:12.5px}

  .badge2{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:20px}
  .b-green{background:#e2f6ee;color:#1c8a5f}
  .b-orange{background:#fdeee5;color:#c85410}
  .b-blue{background:#e5eef4;color:#1a5a7d}
  .b-red{background:#fce6e6;color:#c23b3a}
  .b-yellow{background:#fbf3dc;color:#9a6d00}
  .b-gray{background:#eef1f4;color:#5b6b78}
  .dotb{width:7px;height:7px;border-radius:50%}

  .plate{
    display:inline-block;font-family:'Consolas',monospace;font-weight:800;letter-spacing:1px;
    background:var(--grafite);color:#fff;padding:3px 9px;border-radius:5px;font-size:12.5px;
    border:2px solid #3a4a56;
  }
  .avatar-sm{width:32px;height:32px;border-radius:50%;background:var(--petroleo);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}

  .alert-box{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;margin-bottom:10px;font-size:13px;font-weight:600}
  .alert-red{background:#fce6e6;color:#b53433}
  .alert-yellow{background:#fbf3dc;color:#8a6100}
  .alert-blue{background:#e5eef4;color:#1a5a7d}
  .alert-box .a-ic{font-size:18px}

  /* ===== ORÇAMENTO ===== */
  .orc-layout{display:grid;grid-template-columns:1fr 360px;gap:16px;align-items:start}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--txt-2);margin-bottom:6px}
  .field input,.field select,.field textarea{
    width:100%;padding:11px 13px;border:1.5px solid var(--borda);border-radius:9px;outline:none;background:#fff;
  }
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--laranja)}
  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .add-line{display:flex;gap:10px;align-items:flex-end;background:var(--cinza);padding:12px;border-radius:10px;margin-bottom:12px}
  .add-line .field{flex:1;margin-bottom:0}
  .item-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--cinza)}
  .item-row .i-main{flex:1}
  .item-row .i-name{font-weight:700;font-size:13.5px}
  .item-row .i-meta{font-size:11.5px;color:var(--txt-2)}
  .item-row .i-val{font-weight:700}
  .item-row .i-del{color:var(--vermelho);font-size:16px;padding:4px 8px;border-radius:6px}
  .item-row .i-del:hover{background:#fce6e6}
  .empty{text-align:center;color:var(--txt-2);padding:24px;font-size:13px}

  .resumo{position:sticky;top:0}
  .resumo .line{display:flex;justify-content:space-between;padding:9px 0;font-size:14px}
  .resumo .line.total{border-top:2px solid var(--borda);margin-top:6px;padding-top:14px;font-size:20px;font-weight:800;color:var(--petroleo)}
  .resumo .disc input{width:90px;padding:6px 8px;border:1.5px solid var(--borda);border-radius:7px;text-align:right}

  /* ===== MODAL ===== */
  .modal-bg{position:fixed;inset:0;background:rgba(15,61,87,.5);z-index:50;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal-head{display:flex;align-items:center;padding:20px 22px;border-bottom:1px solid var(--borda)}
  .modal-head h3{font-size:18px;color:var(--petroleo);font-weight:800}
  .modal-head .x{margin-left:auto;font-size:22px;color:var(--txt-2);width:34px;height:34px;border-radius:8px}
  .modal-head .x:hover{background:var(--cinza)}
  .modal-body{padding:22px}
  .modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:16px 22px;border-top:1px solid var(--borda)}

  /* ===== TOAST ===== */
  #toast{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:10px}
  .toast{
    background:var(--grafite);color:#fff;padding:14px 18px;border-radius:11px;
    font-weight:600;font-size:13.5px;box-shadow:0 10px 30px rgba(0,0,0,.25);
    display:flex;align-items:center;gap:10px;animation:slideIn .3s ease;
  }
  .toast.ok{background:var(--verde)}
  .toast.warn{background:var(--laranja)}
  @keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}

  /* charts */
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .bar-row .b-label{width:110px;font-size:12.5px;font-weight:600}
  .bar-track{flex:1;height:22px;background:var(--cinza);border-radius:6px;overflow:hidden}
  .bar-fill{height:100%;border-radius:6px;background:var(--petroleo);display:flex;align-items:center;padding-left:8px;color:#fff;font-size:11px;font-weight:700}
  .bar-row .b-val{width:80px;text-align:right;font-weight:700;font-size:12.5px}

  .config-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .swatch{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;background:var(--cinza)}
  .swatch .sw{width:34px;height:34px;border-radius:8px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
  .hidden{display:none!important}
  .mut{color:var(--txt-2)}
  @media(max-width:1100px){.cards{grid-template-columns:repeat(2,1fr)}.orc-layout{grid-template-columns:1fr}.grid-2,.grid-3{grid-template-columns:1fr}}
</style>
</head>

<!-- ================= LOGIN ================= -->
<div id="login">
  <div class="login-card">
    <div class="brand">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      </div>
      <h1>HERMES</h1>

    <div class="login-sub">Gestão para Oficina Mecânica</div>
    <label>Perfil de acesso</label>

      <option value="Dono">Dono / Administrador</option>
      <option value="Atendente">Atendente / Recepção</option>
      <option value="Mecânico">Mecânico</option>

</div>

<!-- ================= APP ================= -->
<div id="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="side-brand">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      </div>
      <div>
        <span class="name">HERMES</span>
        <span class="tag">Gestão de Oficina</span>
      </div>
    </div>

    <nav id="nav"></nav>
  </aside>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="search">
      <span class="ic">🔍</span>
      <input type="text" placeholder="Buscar placa, cliente ou OS..." id="globalSearch">
    </div>
    <div class="topbar-actions">
      <button class="btn btn-primary" onclick="nav('orcamento');novoOrcamento()">+ Novo Orçamento</button>
      <button class="icon-btn" title="Alertas"><span>🔔</span><span class="dot"></span></button>
      <div class="user-chip">
        <div class="avatar" id="topAvatar">DO</div>
        <div>
          <div class="u-name" id="topName">João (Dono)</div>
          <div class="u-role" id="topRole">Administrador</div>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main" id="main"></main>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

function toast(msg,type=""){
  const t=document.createElement('div');
  t.className='toast '+type;
  t.innerHTML=(type==='ok'?'✅ ':type==='warn'?'⚠️ ':'💡 ')+msg;
  $('#toast').appendChild(t);
  setTimeout(()=>{t.style.opacity=0;t.style.transform='translateX(30px)';setTimeout(()=>t.remove(),300)},2600);
}

function buildNav(){

  MENU.forEach(grp=>{

    grp.items.forEach(it=>{
      h+=`<button class="nav-item" data-id="${it.id}" onclick="nav('${it.id}')">
        <span class="ic">${it.ic}</span><span>${it.label}</span>
        ${it.badge?`<span class="badge">${it.badge}</span>`:''}

  });

}

function nav(view){
  currentView=view;

}

            <button class="btn btn-primary" onclick="addServico()">+ Adicionar</button>
          </div>
          <div id="listaServ"></div>
        </div>
      </div>

      <div class="panel" style="margin-top:16px">
        <div class="panel-head"><h3>📦 Peças (baixa do estoque)</h3></div>
        <div class="panel-body">
          <div class="add-line">
            <div class="field" style="flex:2"><label>Peça</label>
              <select id="add_peca">${DB.pecas.map(p=>`<option value="${p.id}">${p.nome} — ${money(p.venda)} (est. ${p.estoque})</option>`).join('')}</select>
            </div>
            <div class="field" style="max-width:90px"><label>Qtd</label><input type="number" id="add_qtd" value="1" min="1"></div>
            <button class="btn btn-primary" onclick="addPeca()">+ Adicionar</button>
          </div>
          <div id="listaPeca"></div>
        </div>
      </div>
    </div>

    <!-- RESUMO -->
    <div class="panel resumo">
      <div class="panel-head"><h3>💵 Resumo</h3></div>
      <div class="panel-body" id="resumoBox"></div>
    </div>
  </div>`;
  if(clienteId) orcSetCliente(clienteId);
  renderOrc();
}
function orcSetCliente(id){
  orcAtual.clienteId=id; orcAtual.carroId=null;
  const carros=DB.carros.filter(c=>c.clienteId==id);
  $('#orc_car').innerHTML = carros.length
    ? carros.map(c=>`<option value="${c.id}">${c.marca} ${c.modelo} · ${c.placa}</option>`).join('')
    : '<option value="">Cliente sem veículo</option>';
  if(carros.length) orcAtual.carroId=carros[0].id;
  $('#orc_car').onchange=e=>orcAtual.carroId=e.target.value;
}
function addServico(){
  const s=DB.servicos.find(x=>x.id==$('#add_serv').value);
  orcAtual.servicos.push({...s});
  renderOrc();toast('Serviço adicionado','ok');
}
function addPeca(){
  const p=DB.pecas.find(x=>x.id==$('#add_peca').value);
  const qtd=Math.max(1,parseInt($('#add_qtd').value)||1);
  if(qtd>p.estoque){toast(`Estoque insuficiente — vira "aguardando peça"`,'warn')}
  orcAtual.pecas.push({...p,qtd});
  renderOrc();toast('Peça adicionada','ok');
}
function delServ(i){orcAtual.servicos.splice(i,1);renderOrc()}
function delPeca(i){orcAtual.pecas.splice(i,1);renderOrc()}
function renderOrc(){
  const ls=$('#listaServ'); if(!ls)return;
  ls.innerHTML=orcAtual.servicos.length?orcAtual.servicos.map((s,i)=>`
    <div class="item-row"><div class="i-main"><div class="i-name">${s.nome}</div><div class="i-meta">${s.cat}</div></div>
    <span class="i-val">${money(s.mo)}</span><button class="i-del" onclick="delServ(${i})">🗑️</button></div>`).join('')
    :'<div class="empty">Nenhum serviço adicionado</div>';

  $('#listaPeca').innerHTML=orcAtual.pecas.length?orcAtual.pecas.map((p,i)=>`
    <div class="item-row"><div class="i-main"><div class="i-name">${p.nome}</div><div class="i-meta">${p.qtd} × ${money(p.venda)}</div></div>
    <span class="i-val">${money(p.qtd*p.venda)}</span><button class="i-del" onclick="delPeca(${i})">🗑️</button></div>`).join('')
    :'<div class="empty">Nenhuma peça adicionada</div>';

  const totServ=orcAtual.servicos.reduce((s,x)=>s+x.mo,0);
  const totPeca=orcAtual.pecas.reduce((s,x)=>s+x.qtd*x.venda,0);
  const sub=totServ+totPeca;
  const total=Math.max(0,sub-orcAtual.desconto);
  $('#resumoBox').innerHTML=`
    <div class="line"><span>Serviços</span><span>${money(totServ)}</span></div>
    <div class="line"><span>Peças</span><span>${money(totPeca)}</span></div>
    <div class="line"><span>Subtotal</span><span class="t-strong">${money(sub)}</span></div>
    <div class="line disc"><span>Desconto ${currentUser.role==='Mecânico'?'🔒':''}</span>
      <span>R$ <input type="number" value="${orcAtual.desconto}" min="0" ${currentUser.role==='Mecânico'?'disabled':''} onchange="orcAtual.desconto=Math.max(0,parseFloat(this.value)||0);renderOrc()"></span></div>
    <div class="line total"><span>TOTAL</span><span>${money(total)}</span></div>
    <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:14px" onclick="toast('PDF gerado — pronto para WhatsApp (protótipo)','ok')">🖨️ Imprimir / WhatsApp</button>
    <button class="btn btn-success" style="width:100%;justify-content:center;margin-top:10px" onclick="salvarOrcamento(${total})">✔️ Aprovar e gerar OS</button>
  `;
}
function salvarOrcamento(total){
  if(!orcAtual.clienteId){toast('Selecione o cliente','warn');return}
  if(!orcAtual.carroId){toast('Selecione o veículo','warn');return}
  if(!orcAtual.servicos.length && !orcAtual.pecas.length){toast('Adicione ao menos 1 serviço ou peça','warn');return}
  // baixa estoque
  orcAtual.pecas.forEach(p=>{const peca=DB.pecas.find(x=>x.id==p.id);if(peca)peca.estoque=Math.max(0,peca.estoque-p.qtd)});
  const osId=seqOs++;
  DB.ordens.unshift({
    id:osId,clienteId:orcAtual.clienteId,carroId:orcAtual.carroId,
    mecanico:"A atribuir",status:"Aberta",abertura:"01/07",prevista:"03/07",
    total,pago:false,itens:orcAtual.servicos.length+orcAtual.pecas.length
  });
  DB.orcamentos.unshift({id:"OR-0"+(seqOrc++),clienteId:orcAtual.clienteId,carroId:orcAtual.carroId,data:"01/07",validade:"16/07",status:"Aprovado",total});
  toast(`OS #${osId} criada! Estoque baixado automaticamente.`,'ok');
  nav('ordens');
}
function aprovarParaOS(orcId){
  const o=DB.orcamentos.find(x=>x.id===orcId);
  const osId=seqOs++;
  DB.ordens.unshift({id:osId,clienteId:o.clienteId,carroId:o.carroId,mecanico:"A atribuir",status:"Aberta",abertura:"01/07",prevista:"03/07",total:o.total,pago:false,itens:2});
  toast(`Orçamento ${orcId} → OS #${osId} criada!`,'ok');
  nav('ordens');
}

function receberOS(id){

function confirmarRecebimento(id){

  </div>`).join('');
}
