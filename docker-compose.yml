# Hermes — infraestrutura local de desenvolvimento
# Sobe o banco de dados (PostgreSQL) e o cache (Redis).
# Uso:  docker compose up -d      |  para: docker compose down
services:
  postgres:
    image: postgres:16-alpine
    container_name: hermes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes_dev
      POSTGRES_DB: hermes
    ports:
      - "5432:5432"
    volumes:
      - hermes_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hermes-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - hermes_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hermes_pgdata:
  hermes_redisdata:
